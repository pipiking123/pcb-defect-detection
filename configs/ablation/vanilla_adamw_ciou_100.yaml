# Ablation cell: vanilla_adamw_ciou_100
# D-026: vanilla-100 baseline (b) -- optimizer matched to the Day 4b/Day 5 5-epoch
# smoke run (AdamW), serving as an "out of the box" headroom baseline comparable to
# the honest smoke artifact (artifacts/day5_honest_smoke/).
# D-027: T4 wall-time optimization applied (patience=20, cache='ram', batch=32).
#
# Optimizer default source: optimizer is set explicitly below (not 'auto'), so
# Ultralytics does NOT auto-select a per-optimizer lr0/momentum/weight_decay -- it
# would otherwise apply the global ultralytics/cfg/default.yaml lr0=0.01 (SGD-tuned)
# to any named optimizer. D-028 supersedes D-026's LR clause: lr0=0.001 is set
# explicitly below for this AdamW cell, per Loshchilov & Hutter 2019 guidance, to
# avoid confounding the optimizer-effect ablation with an SGD-tuned LR.

name: vanilla_adamw_ciou_100
model: yolo11n.yaml
iou_type: ciou   # DRIVER key, not a train() kwarg

# Training kwargs (all passed to model.train())
epochs: 100
imgsz: 640
batch: 32                # D-027
workers: 2
seed: 42
optimizer: AdamW
lr0: 0.001               # D-028
patience: 20             # D-027
cache: 'ram'             # D-027
save_period: -1          # save only last + best
plots: true

# D-018 augmentation policy (all off except fliplr)
hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.0
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 0.0
